name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Supersede in-flight runs on the same ref so rapid pushes don't stack up minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Full cross-OS matrix on every PR and push. The repo is public, so Actions
      # minutes are free — there's no longer a reason to keep macOS/Windows off the
      # PR loop, and all three are required status checks (see branch-protection.md).
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Pinned to 22 to match Electron's bundled Node; bumping to the engines
          # minimum (24) broke the Electron binary install in the E2E step, so
          # aligning the CI runtime is deferred.
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      # Integration suite (real SQLite, no fixtures): runs the 2 non-fixture-gated
      # files so they can't silently rot while "CI green" holds.
      - run: npm run test:integration

      - run: npm run build

      - name: Install Playwright deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install --with-deps chromium

      - name: Run E2E (Linux only for now)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum npm run test:e2e
