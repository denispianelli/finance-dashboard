name: Dependabot auto-merge

# Auto-merges Dependabot PRs (minor/patch only) once the required checks pass.
# Majors are left for manual review. Needs "Allow auto-merge" enabled in repo
# settings. `pull_request_target` is required so the token has write access on
# Dependabot PRs — we never check out the PR's code, we only read metadata and
# enable auto-merge, so this is safe.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for minor/patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
