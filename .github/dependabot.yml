version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-dev:
        dependency-type: development
        update-types: [minor, patch]
      npm-prod:
        dependency-type: production
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ['*']
